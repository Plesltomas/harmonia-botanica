<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonia Botanica</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--green-dark:#1f3d2b;--green-main:#6fa36f;--green-light:#f4f9f1}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--green-light);color:#222}

nav{position:fixed;width:100%;top:0;background:rgba(255,255,255,0.9);display:flex;justify-content:space-between;padding:15px 40px;z-index:1000}
nav a{margin:0 10px;text-decoration:none;color:#333;font-weight:500}
#cart{font-weight:bold}

header{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:white;background:black}
header h1{font-size:3.5rem}

.btn{padding:12px 25px;border:none;border-radius:30px;cursor:pointer;font-weight:600;margin:5px}
.btn-main{background:var(--green-main);color:white}
.btn-outline{background:transparent;border:2px solid white;color:white}

section{max-width:1200px;margin:100px auto;padding:0 20px}
h2{text-align:center;margin-bottom:40px;color:var(--green-dark)}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.product{background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.05)}
.product img{width:100%;height:200px;object-fit:cover}
.product div{padding:15px}

.page{display:none}
.page.active{display:block}

footer{background:#1f3d2b;color:white;text-align:center;padding:30px}
</style>
</head>

<body>

<nav>
<div><b>Harmonia</b></div>
<div>
<a href="#" onclick="showPage('home')">Domů</a>
<a href="#" onclick="showPage('products')">Produkty</a>
<a href="#" onclick="showPage('cartPage')">Košík</a>
<a href="#" onclick="showPage('contact')">Kontakt</a>
<span id="cart">Košík: 0</span>
</div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<header>
<div>
<h1>Harmonia Botanica</h1>
<p>Přírodní síla bylin</p>
<button class="btn btn-main" onclick="showPage('products')">Nakupovat</button>
</div>
</header>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
<section>
<h2>Produkty</h2>
<div class="products">

<div class="product">
<img src="produkt1.jpg">
<div>
<h3>Bylinné mýdlo</h3>
<button class="btn btn-main" onclick="addToCart('Mýdlo')">Koupit</button>
</div>
</div>

<div class="product">
<img src="produkt2.jpg">
<div>
<h3>Bylinný set</h3>
<button class="btn btn-main" onclick="addToCart('Set')">Koupit</button>
</div>
</div>

<div class="product">
<img src="produkt3.jpg">
<div>
<h3>Sušené byliny</h3>
<button class="btn btn-main" onclick="addToCart('Byliny')">Koupit</button>
</div>
</div>

</div>
</section>
</div>

<!-- CART PAGE -->
<div id="cartPage" class="page">
<section>
<h2>Košík</h2>
<ul id="cart-items"></ul>
<button class="btn btn-main" onclick="checkout()">Pokračovat k objednávce</button>
</section>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
<section>
<h2>Kontakt</h2>
<p style="text-align:center">info@harmonia.cz</p>
</section>
</div>

<footer>
<p>© 2026 Harmonia Botanica</p>
</footer>

<script>
let cartCount=0;
let cartItems=[];

function showPage(pageId){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0,0);
}

function addToCart(product){
    cartCount++;
    cartItems.push(product);
    document.getElementById('cart').innerText='Košík: '+cartCount;

    let list=document.getElementById('cart-items');
    let item=document.createElement('li');
    item.innerText=product;
    list.appendChild(item);
}

function checkout(){
    alert('Objednávka odeslána (demo)');
}
</script>

</body>
</html>
