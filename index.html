<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harmonia Botanica | Přírodní produkty</title>
<meta name="description" content="Přírodní bylinné produkty pro zdraví a pohodu">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--green:#6fa36f;
--dark:#1f3d2b;
--light:#f4f9f1;
--bg:white;
--text:#333;
}

body.dark{
--bg:#1a1a1a;
--text:#eee;
--light:#111;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg);color:var(--text);transition:0.3s}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
z-index:1000;
}

.menu{
display:flex;
gap:15px;
}

.menu a{font-weight:500;}
.menu a:hover{color:var(--green);}

.hamburger{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */
header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://cdn.pixabay.com/photo/2017/07/31/11/21/herbs-2557194_1280.jpg") center/cover;
}

header h1{font-size:3rem;}
.btn{
background:var(--green);
padding:12px 25px;
border:none;
border-radius:25px;
color:white;
margin-top:20px;
cursor:pointer;
}

/* SECTIONS */
section{padding:80px 20px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */
.card{
background:var(--bg);
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{width:100%;height:200px;object-fit:cover;}
.card h3{padding:10px;}
.card p{padding:0 10px;}
.price{font-weight:bold;color:var(--green);margin:10px;}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* CART */
#cart-box{
position:fixed;
right:20px;
bottom:20px;
background:var(--bg);
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
max-width:300px;
}

/* MOBILE */
@media(max-width:768px){
.menu{display:none;flex-direction:column;background:white;position:absolute;top:60px;right:0;padding:20px;}
.menu.active{display:flex;}
.hamburger{display:block;}
header h1{font-size:2rem;}
}
</style>
</head>

<body>

<nav>
<b>Harmonia Botanica</b>
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="menu" id="menu">
<a href="#home">Domů</a>
<a href="#products">Produkty</a>
<a href="#about">O nás</a>
<a href="#contact">Kontakt</a>
<button onclick="toggleDark()">🌙</button>
</div>
</nav>

<header id="home">
<div>
<h1>Harmonia Botanica</h1>
<p>Přírodní síla bylin</p>
<button class="btn" onclick="scrollToSection('products')">Nakupovat</button>
</div>
</header>

<section id="products">
<h2>Produkty</h2>
<div class="grid">

<div class="card">
<img src="https://cdn.pixabay.com/photo/2017/07/31/11/21/herbs-2557194_1280.jpg">
<h3>Mýdlo</h3>
<p>Přírodní péče</p>
<div class="price">149 Kč</div>
<button class="btn" onclick="addToCart('Mýdlo',149)">Koupit</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2019/08/06/15/25/herbs-4388827_1280.jpg">
<h3>Set</h3>
<p>DIY výroba</p>
<div class="price">299 Kč</div>
<button class="btn" onclick="addToCart('Set',299)">Koupit</button>
</div>

</div>
</section>

<section id="about">
<h2>O nás</h2>
<p>Rodinná firma zaměřená na bylinky a zdraví.</p>
</section>

<section>
<h2>Checkout</h2>
<input placeholder="Jméno">
<input placeholder="Email">
<textarea placeholder="Adresa"></textarea>
<button class="btn" onclick="checkout()">Zaplatit</button>
</section>

<section id="contact">
<h2>Kontakt</h2>
<p>info@harmoniabotanica.cz</p>
</section>

<div id="cart-box">
<h3>Košík</h3>
<ul id="cart"></ul>
<p><b>Celkem: <span id="total">0</span> Kč</b></p>
</div>

<script>
let cart=[];
let total=0;

function addToCart(name,price){
cart.push({name,price});
total+=price;
renderCart();
saveCart();
}

function renderCart(){
let el=document.getElementById("cart");
el.innerHTML="";
cart.forEach((item,i)=>{
el.innerHTML+=`<li>${item.name} - ${item.price} Kč <button onclick="removeItem(${i})">x</button></li>`;
});
document.getElementById("total").innerText=total;
}

function removeItem(i){
total-=cart[i].price;
cart.splice(i,1);
renderCart();
saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("total",total);
}

function loadCart(){
cart=JSON.parse(localStorage.getItem("cart"))||[];
total=parseInt(localStorage.getItem("total"))||0;
renderCart();
}

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function checkout(){
alert("Platba simulována (napoj Stripe)");
}

loadCart();
</script>

</body>
</html>
