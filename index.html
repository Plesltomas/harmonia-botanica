<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonia Botanica</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--green-dark:#1f3d2b;--green-main:#6fa36f;--green-light:#f4f9f1}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:var(--green-light)}

nav{position:fixed;width:100%;top:0;background:rgba(255,255,255,0.9);display:flex;justify-content:space-between;padding:15px 40px;z-index:1000}
nav a{margin:0 10px;text-decoration:none;color:#333}
#cart{font-weight:bold}

header{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center;overflow:hidden}
.video-bg{position:absolute;top:50%;left:50%;width:177.77vh;height:100vh;transform:translate(-50%,-50%);z-index:-1}
.video-bg iframe{width:100%;height:100%}
header::after{content:"";position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.5);pointer-events:none;z-index:1}

.btn{padding:12px 25px;border:none;border-radius:30px;margin:5px;cursor:pointer}
.btn-main{background:var(--green-main);color:white}

.page{display:none}
.page.active{display:block}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:100px 20px}
.product{background:white;border-radius:15px;overflow:hidden}
.product img{width:100%;height:200px;object-fit:cover}

section{padding:100px 20px;text-align:center}

</style>
</head>

<body>

<nav>
<div><b>Harmonia</b></div>
<div>
<a href="#" onclick="showPage('home')">Domů</a>
<a href="#" onclick="showPage('products')">Produkty</a>
<a href="#" onclick="showPage('cartPage')">Košík</a>
<span id="cart">Košík: 0</span>
</div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<header>
<div class="video-bg">
<iframe src="https://www.youtube.com/embed/w6uX9jamcwQ?autoplay=1&mute=1&loop=1&playlist=w6uX9jamcwQ&controls=0&modestbranding=1&playsinline=1&enablejsapi=1" allow="autoplay"></iframe>
</div>
<div style="position:relative;z-index:2;">
<h1>Harmonia Botanica</h1>
<p>Přírodní síla bylin</p>
<button class="btn btn-main" onclick="showPage('products')">Nakupovat</button>
</div>
</header>

<section>
<h2>O nás</h2>
<img src="https://tse4.mm.bing.net/th/id/OIP.-f7k6DoJsb1D6827URocjQHaE8?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:60%;border-radius:20px">
<p>Pracujeme s přírodními bylinami a vytváříme produkty pro zdraví.</p>
</section>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
<div class="products">

<div class="product">
<img src="https://th.bing.com/th?id=OIF.iQW7zvRVQ%2bKor54QVFIlMw&rs=1&pid=ImgDetMain&o=7&rm=3">
<h3>Bylinné mýdlo</h3>
<button class="btn btn-main" onclick="addToCart('Mýdlo')">Koupit</button>
</div>

<div class="product">
<img src="https://tse2.mm.bing.net/th/id/OIF.sYCadqzdbEUaSVj9Zevxqw?rs=1&pid=ImgDetMain&o=7&rm=3">
<h3>Bylinný set</h3>
<button class="btn btn-main" onclick="addToCart('Set')">Koupit</button>
</div>

<div class="product">
<img src="https://th.bing.com/th?id=OIF.%2bp790VZGwDxwCxTqU0NYgg&rs=1&pid=ImgDetMain&o=7&rm=3">
<h3>Sušené byliny</h3>
<button class="btn btn-main" onclick="addToCart('Byliny')">Koupit</button>
</div>

<div class="product">
<img src="https://th.bing.com/th?id=OIF.W%2fbSb4jqfL7vuuZ9KtegSg&rs=1&pid=ImgDetMain&o=7&rm=3">
<h3>Bylinný olej</h3>
<button class="btn btn-main" onclick="addToCart('Olej')">Koupit</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
<section>
<h2>Košík</h2>
<ul id="cart-items"></ul>
<button class="btn btn-main" onclick="checkout()">Objednat</button>
</section>
</div>

<script>
let cartCount=0;
function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 window.scrollTo(0,0);
}
function addToCart(p){
 cartCount++;
 document.getElementById('cart').innerText='Košík: '+cartCount;
 let li=document.createElement('li');
 li.innerText=p;
 document.getElementById('cart-items').appendChild(li);
}
function checkout(){alert('Objednávka odeslána!')}
</script>

</body>
</html>
