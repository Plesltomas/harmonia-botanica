<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonia Botanica</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--green-dark:#1f3d2b;--green-main:#6fa36f;--green-light:#f4f9f1}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
html{scroll-behavior:smooth}
body{background:var(--green-light);color:#222}

nav{position:fixed;width:100%;top:0;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);display:flex;justify-content:space-between;padding:15px 40px;z-index:1000}
nav a{margin:0 10px;text-decoration:none;color:#333;font-weight:500}
#cart{font-weight:bold}

header{position:relative;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center;color:white}
.video-bg{position:absolute;top:50%;left:50%;width:177.77vh;height:100vh;transform:translate(-50%,-50%);z-index:-1;pointer-events:none}
.video-bg iframe{width:100%;height:100%}
.hero-content{position:relative;z-index:2}
header::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1}
header h1{font-size:4rem}

.btn{padding:12px 25px;border:none;border-radius:30px;cursor:pointer;font-weight:600;margin:5px;transition:0.3s}
.btn:hover{transform:scale(1.05)}
.btn-main{background:var(--green-main);color:white}
.btn-outline{background:transparent;border:2px solid white;color:white}

section{max-width:1200px;margin:100px auto;padding:0 20px}
h2{text-align:center;margin-bottom:40px;color:var(--green-dark)}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.product{background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.05)}
.product img{width:100%;height:200px;object-fit:cover}
.product div{padding:15px}

.cart-box{position:fixed;right:20px;bottom:20px;background:white;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);width:250px}

footer{background:#1f3d2b;color:white;text-align:center;padding:30px}
</style>
</head>

<body>

<nav>
<div><b>Harmonia</b></div>
<div>
<a href="#home">Domů</a>
<a href="#products">Produkty</a>
<a href="#contact">Kontakt</a>
<span id="cart">Košík: 0</span>
</div>
</nav>

<header id="home">
<div class="video-bg">
<iframe src="https://www.youtube.com/embed/w6uX9jamcwQ?autoplay=1&mute=1&loop=1&playlist=w6uX9jamcwQ&controls=0&modestbranding=1&playsinline=1"></iframe>
</div>
<div class="hero-content">
<h1>Harmonia Botanica</h1>
<p>Přírodní síla bylin</p>
<button class="btn btn-main" onclick="scrollToSection('products')">Nakupovat</button>
</div>
</header>

<section id="products">
<h2>Produkty</h2>
<div class="products">

<div class="product">
<img src="produkt1.jpg">
<div>
<h3>Bylinné mýdlo</h3>
<button class="btn btn-main" onclick="addToCart('Mýdlo')">Koupit</button>
</div>
</div>

<div class="product">
<img src="produkt2.jpg">
<div>
<h3>Bylinný set</h3>
<button class="btn btn-main" onclick="addToCart('Set')">Koupit</button>
</div>
</div>

<div class="product">
<img src="produkt3.jpg">
<div>
<h3>Sušené byliny</h3>
<button class="btn btn-main" onclick="addToCart('Byliny')">Koupit</button>
</div>
</div>

</div>
</section>

<section id="contact">
<h2>Kontakt</h2>
<p style="text-align:center">info@harmonia.cz</p>
</section>

<div class="cart-box">
<h3>Košík</h3>
<ul id="cart-items"></ul>
</div>

<footer>
<p>© 2026 Harmonia Botanica</p>
</footer>

<script>
let cartCount = 0;
let cartItems = [];

function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function addToCart(product){
    cartCount++;
    cartItems.push(product);

    document.getElementById("cart").innerText = "Košík: " + cartCount;

    let list = document.getElementById("cart-items");
    let item = document.createElement("li");
    item.innerText = product;
    list.appendChild(item);
}
</script>

</body>
</html>
